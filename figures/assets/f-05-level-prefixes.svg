<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="664" viewBox="0 0 1320 664" role="img" aria-labelledby="title desc"><title id="title">F-05: レベル接頭辞一覧</title><desc id="desc">AI適用段階、権限、観測性、セキュリティ、ガバナンス、判断、対立、実験、評価証拠、スキルの各接頭辞を整理した表</desc><rect width="100%" height="100%" fill="#ffffff"/><style>text{font-family:-apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,&quot;Noto Sans JP&quot;,sans-serif;fill:#172033}.title{font-size:30px;font-weight:700}.head{font-size:17px;font-weight:700;fill:#0f3b63}.cell{font-size:16px}.small{font-size:14px;fill:#46556b}.line{stroke:#c9d3e1;stroke-width:1}.headbg{fill:#eaf4ff}.rowbg{fill:#f8fbff}.tag{font-weight:700;fill:#0b5cad}</style><text class="title" x="40" y="46">F-05: レベル接頭辞一覧</text><rect class="headbg" x="30" y="72" width="1260" height="64" rx="12"/><text class="head" x="40" y="111">領域</text><text class="head" x="350" y="111">表記</text><text class="head" x="520" y="111">主な章</text><text class="head" x="650" y="111">用途</text><rect class="rowbg" x="30" y="136" width="1260" height="48"/><line class="line" x1="30" x2="1290" y1="136" y2="136"/><text class="cell" x="40" y="167">AI適用段階</text><text class="cell tag" x="350" y="167">A0〜A5</text><text class="cell" x="520" y="167">2</text><text class="cell" x="650" y="167">AIをどこまで業務へ組み込むか</text><line class="line" x1="30" x2="1290" y1="184" y2="184"/><text class="cell" x="40" y="215">権限レベル</text><text class="cell tag" x="350" y="215">P0〜P7</text><text class="cell" x="520" y="215">7</text><text class="cell" x="650" y="215">ツール操作権限の強さ</text><rect class="rowbg" x="30" y="232" width="1260" height="48"/><line class="line" x1="30" x2="1290" y1="232" y2="232"/><text class="cell" x="40" y="263">観測性レベル</text><text class="cell tag" x="350" y="263">O0〜O5</text><text class="cell" x="520" y="263">8</text><text class="cell" x="650" y="263">ログ、トレース、改善の成熟度</text><line class="line" x1="30" x2="1290" y1="280" y2="280"/><text class="cell" x="40" y="311">セキュリティレベル</text><text class="cell tag" x="350" y="311">S0〜S5</text><text class="cell" x="520" y="311">9</text><text class="cell" x="650" y="311">セキュリティ管理の重さ</text><rect class="rowbg" x="30" y="328" width="1260" height="48"/><line class="line" x1="30" x2="1290" y1="328" y2="328"/><text class="cell" x="40" y="359">ガバナンスレベル</text><text class="cell tag" x="350" y="359">G0〜G5</text><text class="cell" x="520" y="359">10</text><text class="cell" x="650" y="359">組織統制の成熟度</text><line class="line" x1="30" x2="1290" y1="376" y2="376"/><text class="cell" x="40" y="407">判断レベル</text><text class="cell tag" x="350" y="407">J0〜J5</text><text class="cell" x="520" y="407">11</text><text class="cell" x="650" y="407">人間判断の明示度</text><rect class="rowbg" x="30" y="424" width="1260" height="48"/><line class="line" x1="30" x2="1290" y1="424" y2="424"/><text class="cell" x="40" y="455">Connection Debtレベル</text><text class="cell tag" x="350" y="455">C0〜C5</text><text class="cell" x="520" y="455">12</text><text class="cell" x="650" y="455">未処理対立の重さ</text><line class="line" x1="30" x2="1290" y1="472" y2="472"/><text class="cell" x="40" y="503">実験レベル</text><text class="cell tag" x="350" y="503">X0〜X5</text><text class="cell" x="520" y="503">13</text><text class="cell" x="650" y="503">実験の影響範囲</text><rect class="rowbg" x="30" y="520" width="1260" height="48"/><line class="line" x1="30" x2="1290" y1="520" y2="520"/><text class="cell" x="40" y="551">評価証拠レベル</text><text class="cell tag" x="350" y="551">EV0〜EV5</text><text class="cell" x="520" y="551">15</text><text class="cell" x="650" y="551">認定に使う証拠の強さ</text><line class="line" x1="30" x2="1290" y1="568" y2="568"/><text class="cell" x="40" y="599">スキルレベル</text><text class="cell tag" x="350" y="599">Lv1〜Lv6</text><text class="cell" x="520" y="599">15</text><text class="cell" x="650" y="599">個人・チーム・全社能力</text><line class="line" x1="30" x2="1290" y1="616" y2="616"/><text class="small" x="40" y="646">注: E0〜E5は使わず、実験はX、評価証拠はEVを使う。</text></svg>
